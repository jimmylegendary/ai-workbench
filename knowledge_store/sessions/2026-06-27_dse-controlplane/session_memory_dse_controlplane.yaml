schema_version: "0.1"
session:
  id: "dse-controlplane-strategy-2026-06-27"
  date: "2026-06-27"
  owner: "Jimmy"
  context: "SAIT / memory-centric AI system architecture 과제. 6개 아이템 중 본업(1번 control plane)과 6번(TTT)을 중심으로 전략/논문/선행연구 정리."
  language: "ko"

items:
  - id: 1
    name: "End-to-end simulation platform control plane web app"
    role: "본업 그 자체 (the instrument)"
    status: "active / 현재 일"
    note: >
      실측축(real service infra -> OTel trace), 합성축(syntorch -> Chakra trace),
      시뮬축(LLM ServingSim + ASTRA-sim)을 잇는 오케스트레이션+데이터 레이어.
      본질은 web UI가 아니라 '실험 1건 = (workload, hw config, sim config) -> trace -> metric -> DB row -> 비교가능 projection'
      파이프라인을 재현가능하게 고정하는 것.
  - id: 2
    name: "Team/personal 지식저장소 infra + skill (-> continual learning)"
    role: "5번 수집물 + 1·6번 실험결과/trace/insight가 재구성 가능하게 보존되는 기억장치"
    status: "supporting"
    note: "continual learning은 함정. append+retrieve+skill-wrap v0 먼저. 1번 DB 스키마가 2번 핵심 일부."
  - id: 3
    name: "논문/특허 작성 harness (engineered agent)"
    role: "신뢰의 사다리 정상 결과를 권리화. DeepStack 등과 경계 명시 포함."
    status: "deferred / 1번 첫 projection 직후"
  - id: 4
    name: "AI tip/skill 공유 website + REST API"
    role: "'도메인 지식 있으면 누구나 축을 흔든다' thesis의 실현 표면. 2번 위 read 레이어."
    status: "deferred / 가장 나중"
  - id: 5
    name: "관심사 기반 paper/article/증권보고서/커뮤니티 동향 자동수집+문서화"
    role: "본업의 조기경보 레이더 + 1·6번 입력 파이프. novelty 보호 = 생존장비."
    status: "elevated / 좁은 버전 며칠 내 착수 권고"
    note: "DeepStack·Minsoo Rhu 라인을 '처음 봤음'이 이 아이템을 보조->본업 일부로 승격시킨 근거."
  - id: 6
    name: "TTT 포함 미래 AI 기술 수집/실험/연구 자동화"
    role: "1번 instrument에 미래 축(TTT-class workload)을 먹이는 워크로드 연구. 1번의 미래 확장."
    status: "active (본업과 결합)"
    note: "TTT = inference 중 weight update -> write traffic/gradient/optimizer state라는 새 메모리 축. memory device 제안의 결정적 증거."

thesis:
  central: >
    새 아키텍처 발견이 '천재의 영감'에 의존하는 건 아이디어를 싸게 실험할 인프라가 없기 때문이다.
    그 instrument를 만들면 발견이 감의 영역에서 체계적 탐색의 영역으로 내려온다.
  dse_reframe: >
    DSE를 '고정된 design space 내 최적해 탐색'이 아니라
    'design space의 축 자체가 workload/시간에 따라 이동·신설되는 것을 증거기반으로 추적'으로 재정의.
  dependent_var_insight: >
    capacity vs bandwidth는 답이 아니라 출력. 진짜 질문은 어떤 workload 축이 종속변수 비율을 지배하고,
    그 비율이 어떻게 이동하며, 아직 안 보이는 새 축이 생기는가이다.
  novelty_one_liner: >
    기존 memory-centric 연구는 전문가가 하나의 아키텍처를 '주장'(MC-DLA, MemOS, CIM surveys).
    기존 DSE 도구는 고정된 device class 안에서 최적해를 '자동 탐색'(DeepStack, SECDA-DSE).
    둘 사이 빈자리 = device class 미정 상태에서 도메인지식만 있으면 누구나 축을 흔들며 가설을 싸게 실험하고
    그 결과로 새 device spec과 미래 scaling law를 역산하는 instrument.
  positioning: "solver가 아니라 instrument. 최적해 자동탐색이 아니라 사람이 축을 흔드는 explorer's instrument."

components:
  syntorch:
    desc: "torch frontend와 정확히 동일, 아래 전부(kernel~hw spec 구조) 추상화한 실행형 백엔드. 돌리면 hw-optimal Chakra trace 생성."
    nature: "executable synthetic frontend. measurement도 pure analytical model도 아닌 제3의 점. 존재하지 않는 메모리 시스템 위에서 실제 모델을 돌려 trace 추출."
    target: "vLLM에 torch 대신 syntorch 설치 -> vLLM 돌리면 Chakra trace 산출."
    tiling_decision: "A안 = 사람이 설계한 고정 partitioning/tiling 전략. B안=자동탐색은 내년."
    critical_risk: "trace 신뢰도. ground truth 없으면 reviewer 첫 질문은 '그거 맞다는 걸 어떻게 아냐'. A100 실측 OTel trace와 대조 검증 필수."
    real_infra: "진짜 service infra -> OTel 기반 trace 추출. A100 + vLLM + LMCache 스택 보유."
    sim_stack: "타팀: LLM ServingSim + ASTRA-sim, SoC 윗레벨 시뮬레이션."
    status_blocker: "syntorch가 vLLM에 완벽히 미연결 -> 현재 LLM ServingSim으로 대체 중."

schema_design:
  hardest_problem: "A(DSE 축/스키마 정의)가 B(엔지니어링 연결)보다 100만배 중요. 스키마/interface는 뺐다 넣는 게 지옥, 추가는 상대적으로 쌈."
  guiding_principle: >
    어디까지 추상화하고 어디서 멈출지의 기준 = metric의 인과사슬.
    종속변수(memory traffic, capacity pressure, latency)를 바꾸는 인과 인자는 전부 1급 스키마 필드,
    안 바꾸는 건 전부 opaque blob.
  ir_backbone: "tensor를 노드, data movement를 엣지로 하는 시간축 있는 그래프. Chakra가 그 방향. 단 memory annotation을 1급 필드로 강제."
  required_fields:
    node_op: ["input tensor refs", "output tensor refs", "working set(op 생존 중)"]
    tensor: ["size", "dtype", "allocated_at", "freed_at", "residency(memory tier)", "partitioning/tiling 전략 id"]
    edge_movement: ["src tier", "dst tier", "bytes", "sync/async"]
  anti_break_devices:
    - "schema_version 태그 + 핵심5필드 외 전부 nullable/optional. consumer는 unknown field 무시."
    - "모든 엔티티에 opaque attributes 맵 1개. metric 인과에 반복 등장하면 1급 필드로 승격."
    - "source adapter는 IR을 향해서만 말한다. 코어는 IR만 안다. source가 못 채우면 명시적 null."
  fill_levels:
    L0: "op-level graph + tensor size/lifetime. capacity peak, rough traffic 산출. ServingSim도 제공. 첫 의미있는 projection."
    L1: "+ memory tier residency + per-tier movement bytes. partitioning/tiling이 metric에 미치는 영향 첫 가시화. syntorch 진짜 가치."
    L2: "+ kernel-level tiling 스케줄, intra-kernel reuse, hw-optimal runtime 로직. syntorch가 vLLM에 붙은 뒤."
  fill_level_note: "L0/L1/L2는 다른 스키마가 아니라 같은 스키마의 fill level."

papers:
  - id: "P1"
    flagship: true
    title: "SynTorch: An Executable Synthetic Frontend for Memory-Centric Design Space Exploration of Unbuilt AI Hardware"
    tldr: >
      PyTorch와 frontend 동일하지만 kernel·runtime·memory tier를 가상 hw에 맞춰 추상 구현한 실행형 백엔드.
      실제 모델(vLLM 등)을 코드 변경 없이 돌리면 제안 partitioning/tiling이 반영된 hw-optimal Chakra trace 생성.
    venue: ["ASPLOS(우선)", "MICRO", "MLSys(워크숍 fallback)"]
    patent_link: "가상 메모리 계층 위 실행형 trace 생성 + 그로부터 capacity/traffic 유도 = 방법 특허"
    survival_condition: "A100 실측 OTel trace 대비 syntorch trace 오차 보고(validation) 필수."
  - id: "P2"
    title: "Tracking the Moving Axes: Evidence-Based Projection of Memory Demand Shifts in Evolving AI Workloads"
    tldr: >
      단일시점 특성화 대신 실측(OTel)·합성(SynTorch)·시뮬(ServingSim/ASTRA-sim)을
      하나의 memory-annotated IR로 통합하는 control plane으로 capacity vs bandwidth 지배 비율의 이동을 추적.
    venue: ["ISCA(비전/projection 선호)", "IEEE Micro 특집/HotInfra류"]
    patent_link: "이종 trace 통합 IR + 종속변수 비율 이동 탐지 = 메모리 시스템 설계 방법 특허"
  - id: "P3"
    alpha_omega: true
    title: "When Inference Writes Back: The Memory Traffic Signature of Test-Time Training and Its Architectural Implications"
    tldr: >
      TTT는 추론 중 weight 갱신 -> prefill/decode와 근본적으로 다른 메모리 거동
      (gradient·optimizer state·write traffic, 갱신 weight 재사용)을 만든다.
    venue: ["HotChips/HotInfra/ASPLOS WACI(vision 깃발)", "결과 단단해지면 MICRO/ISCA 본트랙"]
    patent_link: "추론 중 write traffic 겨냥한 메모리 device 구조 = 특허 먼저, 논문이 따라가는 그림"
    note: "이 과제의 알파이자 오메가. 단 3편은 출력이지 입력. 1·2 신뢰사다리 없으면 position paper에 그침."

papers_program_logic: "P1(도구) -> P2(현상/방법론) -> P3(미래 축 첫 사례). P1·P2=방법/도구 특허, P3=device 구조 특허."

trust_ladder:
  premise: "P3가 나오려면 존재하지 않는 4개(model, device, algorithm/runtime, OS support)를 동시에 가정. 4개 다 가정 위 결론은 하나만 흔들려도 무너짐."
  rung_1_device: "존재하지 않는 device -> syntorch로 가상화. 단 syntorch 자신이 A100 실측 대조 검증돼야 성립."
  rung_2_algorithm: "존재하지 않는 algorithm/runtime/tiling -> syntorch 추상 백엔드가 코드 구현체로 담음."
  rung_3_law: "고정 design space가 아니라 축 이동/신설 -> control plane(P2)로 여러 구성에서 체계적 출현 입증."
  staged_release:
    vision: "지금 가능. 정성적 논증+back-of-envelope. HotChips/WACI. 'projection, not measurement' 명시. 깃발+특허 우선."
    quantified: "syntorch 검증 후. TTT-class를 syntorch에 태워 한 구성에서 write traffic·capacity peak 수치화."
    law: "control plane 후. 여러 model 크기·갱신빈도·context sweep으로 새 축 스케일을 함수화."
  weakest_link: "model도 device도 아닌 'A안 고정 tiling이 그럴듯하다'는 가정. optimal 아니면 trace도 spec 도출도 틀림."

related_work:
  pattern_finding: "memory-centric 연구는 전부 '주장형'. DSE 도구는 전부 '고정 device class 내 최적 탐색'. 그 사이가 빈자리."
  closest_threats:
    - name: "DeepStack (Imperial College)"
      url: "https://arxiv.org/pdf/2604.04750"
      why: "3D 메모리를 bank 수준까지 모델링, 빠른 시뮬, vLLM 실측 대비 12% 오차 교차검증. 방법론적으로 가장 위협적."
      differentiation: "DeepStack=known device(3D-stacked DRAM) 정밀 탐색. 우리=unknown device 발견."
    - name: "Minsoo Rhu (KAIST) 라인 — Beyond the Memory Wall / MC-DLA"
      url: "https://arxiv.org/pdf/1902.06468"
      why: "메모리중심+워크로드 특성화+한국+인접 생태계. 가까운 선행이자 잠재 reviewer."
      differentiation: "그들=아키텍처 제안. 우리=아키텍처 발견하는 도구."
  context_refs:
    - name: "MemOS"
      url: "https://arxiv.org/html/2505.22101v1"
      note: "전통 scaling law 수확체감, 메모리=1급 자원 실행 패러다임 주장형"
    - name: "Memory-Centric Computing (Mutlu)"
      url: "https://arxiv.org/pdf/2305.20000"
      note: "processor-centric 사고가 최대 채택장벽"
    - name: "SECDA-DSE"
      url: "https://arxiv.org/abs/2605.05920"
      note: "LLM을 DSE 루프에 넣어 자동탐색 = solver 패러다임"
    - name: "ACM TODAES memory-centric HW/SW co-design"
      url: "https://dl.acm.org/doi/10.1145/3729227"
    - name: "CIM survey (Memory Is All You Need)"
      url: "https://arxiv.org/html/2406.08413v1"
  impact_assessment:
    verdict: "있음, 단 조건부."
    uniqueness: "빈자리가 진짜라 프레이밍 독특성 충분. ISCA/MICRO가 좋아하는 패러다임 전환 서사 가능."
    risk: "모든 무게가 syntorch trace 신뢰도 + A안 tiling 가정에 실림. DeepStack이 12% 검증 보여준 마당이라 검증 허술하면 비교당함."
    structural_advantage: "NVIDIA/AMD/ARM은 자기 device class에 갇혀 이 질문을 못 함. 메모리 회사는 device class가 열린 거의 유일한 자리."
    alarm: "DeepStack·Rhu 라인을 처음 봤다는 것은 자동수집이 본업의 조기경보 레이더임을 입증."

critical_path:
  - step: "지금"
    action: "syntorch<->A100 검증 골든 테스트 + L0 IR 종이 검증"
    rationale: "P1 생존조건이자 1번 척추."
  - step: "병렬(며칠)"
    action: "좁은 키워드 레이더(5번 최소판) -> 2번 적재"
    rationale: "memory-centric DSE / memory device for LLM / Minsoo Rhu·DeepStack 인용추적만 매주 긁기."
  - step: "다음"
    action: "source-agnostic control plane로 ServingSim 한 바퀴 -> 첫 projection"
    rationale: "ServingSim은 source A. syntorch가 source B로 나중 합류."
  - step: "그 후"
    action: "syntorch source 합류 -> TTT 축 추가(6번) -> 사다리 올라가며 P3 단계 출시"

critical_path_open_decision: "이번 주 착수: (a) 좁은 레이더 먼저 vs (b) syntorch 검증 골든 테스트 먼저. 둘 다 급함. '안 돌면 더 불안한 쪽'으로 선택."

user_profile_signals:
  - "code-verified-claims-over-documentation 선호"
  - "강점: systems-level 추상화, cross-domain 프레임워크 적용"
  - "growth edge: 가설 synthesis가 아니라 generation"
  - "질 최우선, 양 무관심"
